# Webhook Database memanggil URL ini tanpa JWT user — harus false agar INSERT trx_reports diterima.
[functions.fonnte-alert]
enabled = true
verify_jwt = false
entrypoint = "./functions/fonnte-alert/index.ts"

[functions.fonnte-bot]
enabled = true
verify_jwt = true
import_map = "./functions/fonnte-bot/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/fonnte-bot/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/fonnte-bot/*.html" ]
